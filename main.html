<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>2x2 Grid Layout</title>

  <style>
    /* Grid container */
    .holder {
      display: grid;
      width: 200px;
      height: 200px;
      grid-template-rows: repeat(2, 1fr);
      grid-template-columns: repeat(2, 1fr);
      border: 2px solid #000;
    }

    /* Optional styling just for visibility */
    .item {
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      border: 1px solid white;
    }
  </style>
</head>

<body>

  <div class="holder">
    <div class="item" style="background: red;">1</div>
    <div class="item" style="background: blue;">2</div>
    <div class="item" style="background: green;">3</div>
    <div class="item" style="background: orange;">4</div>
  </div>

</body>
</html>
